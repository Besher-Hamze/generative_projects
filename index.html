<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد مشاريع التخرج</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0E1014;
            --surface: #161920;
            --surface-2: #1E222C;
            --border: #2A2F3A;
            --text: #EDE6D6;
            --text-dim: #9AA0AE;
            --accent: #D4A574;
            --accent-hover: #E0B583;
            --accent-glow: rgba(212, 165, 116, 0.15);
            --user-bg: #1E3147;
            --user-border: #2D4766;
            --danger: #E07B7B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', system-ui, sans-serif;
            font-size: 16px;
            line-height: 1.7;
            overflow: hidden;
        }

        body {
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, var(--accent-glow), transparent),
                radial-gradient(ellipse 60% 40% at 0% 100%, rgba(80, 120, 180, 0.07), transparent);
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
        }

        /* ========== Header ========== */
        header {
            padding: 1.1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(14, 16, 20, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .logo { display: flex; align-items: center; gap: 0.85rem; }

        .logo-mark {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #B8894F);
            display: grid; place-items: center;
            font-family: 'Reem Kufi', serif;
            font-weight: 700;
            color: var(--bg);
            font-size: 1.25rem;
            box-shadow: 0 4px 12px rgba(212, 165, 116, 0.25);
        }

        .logo-text h1 {
            font-family: 'Reem Kufi', serif;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.01em;
        }

        .logo-text p {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .clear-btn {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .clear-btn:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        /* ========== Model selector ========== */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .model-select-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .model-select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.5rem 2.25rem 0.5rem 0.85rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            min-width: 140px;
            max-width: 200px;
            text-overflow: ellipsis;
            direction: ltr;  /* أسماء النماذج لاتينية */
            text-align: start;
        }
        .model-select:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--text);
        }
        .model-select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .model-select:disabled {
            opacity: 0.5;
            cursor: wait;
        }
        .model-select option {
            background: var(--surface);
            color: var(--text);
        }

        /* Custom dropdown arrow on the left (since dir=ltr on select inside RTL page) */
        .model-select-wrapper::after {
            content: '';
            position: absolute;
            left: 0.75rem;
            top: 50%;
            width: 8px;
            height: 8px;
            border-right: 1.5px solid var(--text-dim);
            border-bottom: 1.5px solid var(--text-dim);
            transform: translateY(-75%) rotate(45deg);
            pointer-events: none;
            transition: border-color 0.2s;
        }
        .model-select-wrapper:hover::after {
            border-color: var(--accent);
        }

        @media (max-width: 640px) {
            .logo-text p { display: none; }
            .model-select { min-width: 110px; max-width: 140px; font-size: 0.78rem; }
            .clear-btn { font-size: 0.78rem; padding: 0.5rem 0.75rem; }
        }

        /* ========== Messages ========== */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 8px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .messages::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* ========== Welcome screen ========== */
        .welcome {
            margin: auto;
            text-align: center;
            max-width: 520px;
            padding: 2rem 1rem;
            animation: fade-up 0.6s ease-out;
        }

        .welcome h2 {
            font-family: 'Reem Kufi', serif;
            font-size: 1.85rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome p {
            color: var(--text-dim);
            margin-bottom: 2rem;
        }

        .suggestions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .suggestion {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 10px;
            font-family: inherit;
            color: var(--text);
            text-align: start;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .suggestion:hover {
            border-color: var(--accent);
            background: var(--surface-2);
            transform: translateY(-1px);
        }

        @media (max-width: 600px) {
            .suggestions { grid-template-columns: 1fr; }
            .welcome h2 { font-size: 1.5rem; }
        }

        /* ========== Message bubbles ========== */
        .message {
            max-width: 85%;
            animation: fade-up 0.35s ease-out;
            display: flex;
            flex-direction: column;
        }

        /* In RTL flex column: flex-start = right edge, flex-end = left edge */
        .message.user { align-self: flex-start; }   /* right side in RTL */
        .message.assistant { align-self: flex-end; } /* left side in RTL */

        .role-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
            font-weight: 500;
            padding-inline: 0.3rem;
        }
        .message.assistant .role-label { color: var(--accent); }

        .bubble {
            padding: 0.9rem 1.15rem;
            border-radius: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.8;
        }

        .message.user .bubble {
            background: var(--user-bg);
            border: 1px solid var(--user-border);
            border-top-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .bubble.error {
            color: var(--danger);
            background: rgba(224, 123, 123, 0.08);
            border-color: rgba(224, 123, 123, 0.3);
        }

        /* ========== Typing indicator ========== */
        .typing {
            display: inline-flex;
            gap: 5px;
            padding: 0.3rem 0.1rem;
        }
        .typing span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== Input area ========== */
        .input-area {
            padding: 1rem 1.5rem 1.25rem;
            border-top: 1px solid var(--border);
            background: rgba(14, 16, 20, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.4rem;
            transition: all 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            padding: 0.6rem 0.75rem;
            max-height: 180px;
            min-height: 28px;
            outline: none;
        }
        textarea::placeholder { color: var(--text-dim); }

        .send-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            width: 44px; height: 44px;
            border-radius: 10px;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .send-btn svg {
            width: 18px; height: 18px;
            transform: scaleX(-1); /* mirror for RTL */
        }

        .hint {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 0.6rem;
        }

        kbd {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 6px;
            font-family: 'Reem Kufi', monospace;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="logo">
                <div class="logo-mark">م</div>
                <div class="logo-text">
                    <h1>مولد مشاريع التخرج</h1>
                    <p>مساعد ذكي لاقتراح أفكار المشاريع</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="model-select-wrapper">
                    <select class="model-select" id="model-select" title="اختر النموذج" disabled>
                        <option value="">جاري التحميل...</option>
                    </select>
                </div>
                <button class="clear-btn" onclick="clearChat()">محادثة جديدة</button>
            </div>
        </header>

        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <h2>مرحباً بك 👋</h2>
                <p>اسألني عن فكرة مشروع تخرج، أو اختر أحد الاقتراحات التالية:</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="useSuggestion('اقترح لي مشروع تخرج في مجال الذكاء الاصطناعي')">
                        💡 مشروع في الذكاء الاصطناعي
                    </button>
                    <button class="suggestion" onclick="useSuggestion('أريد فكرة تطبيق موبايل مبتكر')">
                        📱 تطبيق موبايل مبتكر
                    </button>
                    <button class="suggestion" onclick="useSuggestion('اقترح لي مشروع يستخدم الرؤية الحاسوبية Computer Vision')">
                        👁️ مشروع رؤية حاسوبية
                    </button>
                    <button class="suggestion" onclick="useSuggestion('أريد مشروع IoT باستخدام أجهزة استشعار')">
                        🔌 مشروع إنترنت الأشياء
                    </button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="input"
                    placeholder="اكتب سؤالك هنا..."
                    rows="1"
                    onkeydown="handleKey(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()" title="إرسال">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="hint">
                اضغط <kbd>Enter</kbd> للإرسال · <kbd>Shift</kbd> + <kbd>Enter</kbd> لسطر جديد
            </div>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');

        let conversation = [];
        let isLoading = false;
        let selectedModel = 'qwen2.5:7b'; // سيتم تحديثه من /api/models

        const WELCOME_HTML = document.getElementById('welcome').outerHTML;

        // ========== تحميل النماذج المتاحة من الخادم ==========
        async function loadModels() {
            try {
                const res = await fetch('http://localhost:8000/api/models');
                const data = await res.json();

                modelSelect.innerHTML = '';
                const models = (data.models && data.models.length) ? data.models : [data.default];

                models.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    if (name === data.default) opt.selected = true;
                    modelSelect.appendChild(opt);
                });

                selectedModel = data.default;
                modelSelect.disabled = false;

                if (data.error) {
                    console.warn('Ollama warning:', data.error);
                }
            } catch (e) {
                console.error('فشل تحميل النماذج:', e);
                modelSelect.innerHTML = `<option value="${selectedModel}">${selectedModel}</option>`;
                modelSelect.disabled = false;
            }
        }

        modelSelect.addEventListener('change', (e) => {
            selectedModel = e.target.value;
        });

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 180) + 'px';
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function useSuggestion(text) {
            inputEl.value = text;
            autoResize(inputEl);
            sendMessage();
        }

        function clearChat() {
            conversation = [];
            messagesEl.innerHTML = WELCOME_HTML;
        }

        function removeWelcome() {
            const w = document.getElementById('welcome');
            if (w) w.remove();
        }

        function addMessage(role, content, isError = false) {
            removeWelcome();

            const msgEl = document.createElement('div');
            msgEl.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'role-label';
            label.textContent = role === 'user' ? 'أنت' : 'المساعد';
            msgEl.appendChild(label);

            const bubble = document.createElement('div');
            bubble.className = 'bubble' + (isError ? ' error' : '');
            bubble.textContent = content;
            msgEl.appendChild(bubble);

            messagesEl.appendChild(msgEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return bubble;
        }

        function addTypingIndicator() {
            removeWelcome();
            const msgEl = document.createElement('div');
            msgEl.className = 'message assistant';
            msgEl.id = 'typing-msg';
            msgEl.innerHTML = `
                <div class="role-label">المساعد</div>
                <div class="bubble">
                    <div class="typing"><span></span><span></span><span></span></div>
                </div>
            `;
            messagesEl.appendChild(msgEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typing-msg');
            if (el) el.remove();
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;

            addMessage('user', text);
            conversation.push({ role: 'user', content: text });

            inputEl.value = '';
            autoResize(inputEl);

            addTypingIndicator();

            try {
                const res = await fetch('http://localhost:8000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: text,
                        // نرسل كل الرسائل السابقة عدا الحالية (الحالية مرسلة في query)
                        history: conversation.slice(0, -1),
                        model: selectedModel
                    })
                });

                removeTypingIndicator();

                if (!res.ok) {
                    const err = await res.json().catch(() => ({ detail: 'خطأ غير معروف' }));
                    addMessage('assistant', `⚠️ ${err.detail || 'فشل الاتصال بالخادم'}`, true);
                } else {
                    const data = await res.json();
                    addMessage('assistant', data.message);
                    conversation.push({ role: 'assistant', content: data.message });
                }
            } catch (e) {
                removeTypingIndicator();
                addMessage('assistant', `⚠️ خطأ في الاتصال: ${e.message}`, true);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        inputEl.focus();
        loadModels();
    </script>
</body>
</html>
